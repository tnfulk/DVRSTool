<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">DVRS Planner Motorola Solutions dark-mode preview</title>
  <desc id="desc">A branded preview of the DVRS planner using a Motorola Solutions-inspired dark blue palette with light blue accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#061321"/>
      <stop offset="55%" stop-color="#0a1d31"/>
      <stop offset="100%" stop-color="#102844"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f2740"/>
      <stop offset="100%" stop-color="#15395a"/>
    </linearGradient>
    <linearGradient id="required" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d2238"/>
      <stop offset="100%" stop-color="#112d47"/>
    </linearGradient>
    <linearGradient id="optional" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1b2d"/>
      <stop offset="100%" stop-color="#10233a"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4aa6e9"/>
      <stop offset="100%" stop-color="#2f7fcb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020912" flood-opacity="0.45"/>
    </filter>
    <style>
      .title { font: 700 54px 'Segoe UI', Arial, sans-serif; fill: #f3f8ff; }
      .h2 { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #eef5ff; }
      .h3 { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #edf5ff; }
      .body { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #b2c5d9; }
      .small { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #5cbcff; letter-spacing: 1.8px; text-transform: uppercase; }
      .label { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #dbe9f8; }
      .micro { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #88a2ba; }
      .chip { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #eaf4ff; letter-spacing: 0.5px; }
      .value { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #f1f7ff; }
    </style>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="1350" cy="120" r="240" fill="#133b5d" opacity="0.32"/>
  <circle cx="1540" cy="350" r="290" fill="#0b2a48" opacity="0.26"/>
  <circle cx="180" cy="1080" r="280" fill="#123252" opacity="0.16"/>

  <rect x="86" y="56" width="1428" height="1088" rx="34" fill="#081624" stroke="#1a3855" stroke-width="2" filter="url(#shadow)"/>

  <rect x="120" y="96" width="1360" height="214" rx="26" fill="url(#hero)" stroke="#2d5578"/>
  <text x="156" y="146" class="small">Motorola Solutions DVR-LX planning aid</text>
  <text x="156" y="212" class="title">DVRS in-band planner</text>
  <text x="156" y="256" class="body">Rebuilt around Motorola Solutions' product-marketing dark-blue direction, using a classic light-blue and dark-blue pairing with restrained neutral support.</text>
  <rect x="1185" y="132" width="250" height="128" rx="22" fill="#0a1a2b" stroke="#2e5f8f"/>
  <text x="1216" y="168" class="small">Palette preview</text>
  <rect x="1218" y="188" width="36" height="36" rx="10" fill="#061321"/>
  <rect x="1268" y="188" width="36" height="36" rx="10" fill="#14314d"/>
  <rect x="1318" y="188" width="36" height="36" rx="10" fill="#4aa6e9"/>
  <rect x="1368" y="188" width="36" height="36" rx="10" fill="#eaf4ff"/>
  <text x="1218" y="245" class="micro">dark navy</text>
  <text x="1305" y="245" class="micro">brand blue accent</text>

  <rect x="120" y="344" width="1360" height="454" rx="28" fill="#091827" stroke="#183750"/>

  <rect x="146" y="370" width="1308" height="200" rx="22" fill="url(#required)" stroke="#27557a"/>
  <text x="176" y="412" class="small">Required</text>
  <text x="176" y="448" class="h2">Planning Inputs</text>
  <text x="176" y="480" class="body">The key form section gets the strongest blue emphasis so the primary workflow is immediately obvious.</text>

  <g>
    <text x="176" y="530" class="label">Country</text>
    <rect x="176" y="542" width="292" height="56" rx="14" fill="#0b1726" stroke="#406c93"/>
    <text x="198" y="578" class="value">United States</text>

    <text x="492" y="530" class="label">System Frequency Configuration</text>
    <rect x="492" y="542" width="384" height="56" rx="14" fill="#0b1726" stroke="#406c93"/>
    <text x="514" y="578" class="value">Only 800 MHz system frequencies</text>

    <text x="900" y="530" class="label">800 MHz Mobile TX Low</text>
    <rect x="900" y="542" width="250" height="56" rx="14" fill="#0b1726" stroke="#406c93"/>
    <text x="922" y="578" class="value">806.0</text>

    <text x="1174" y="530" class="label">800 MHz Mobile TX High</text>
    <rect x="1174" y="542" width="250" height="56" rx="14" fill="#0b1726" stroke="#406c93"/>
    <text x="1196" y="578" class="value">807.0</text>
  </g>

  <g>
    <text x="176" y="640" class="label">DVRS TX (MHz)</text>
    <rect x="176" y="652" width="292" height="56" rx="14" fill="#0b1726" stroke="#2c4f70"/>
    <text x="198" y="688" class="micro">Optional</text>

    <text x="492" y="640" class="label">DVRS RX (MHz)</text>
    <rect x="492" y="652" width="292" height="56" rx="14" fill="#0b1726" stroke="#2c4f70"/>
    <text x="514" y="688" class="micro">Optional</text>
  </g>

  <rect x="146" y="590" width="1308" height="182" rx="22" fill="url(#optional)" stroke="#24425e"/>
  <text x="176" y="632" class="small">Optional</text>
  <text x="176" y="668" class="h2">Ordering Details</text>

  <g>
    <text x="176" y="718" class="label">Agency name</text>
    <rect x="176" y="730" width="292" height="56" rx="14" fill="#081320" stroke="#294760"/>
    <text x="492" y="718" class="label">Date</text>
    <rect x="492" y="730" width="220" height="56" rx="14" fill="#081320" stroke="#294760"/>
    <text x="736" y="718" class="label">Mobile Radio Type</text>
    <rect x="736" y="730" width="260" height="56" rx="14" fill="#081320" stroke="#294760"/>
    <text x="1020" y="718" class="label">Control Head Type</text>
    <rect x="1020" y="730" width="180" height="56" rx="14" fill="#081320" stroke="#294760"/>
    <text x="1224" y="718" class="label">Antenna Type</text>
    <rect x="1224" y="730" width="200" height="56" rx="14" fill="#081320" stroke="#294760"/>
  </g>

  <rect x="146" y="824" width="240" height="58" rx="16" fill="url(#cta)"/>
  <text x="201" y="861" class="chip">Evaluate plans</text>
  <rect x="404" y="824" width="148" height="58" rx="16" fill="#0f2236" stroke="#345777"/>
  <text x="455" y="861" class="chip">Reset</text>

  <g>
    <rect x="120" y="920" width="316" height="170" rx="24" fill="#0c1b2c" stroke="#244463"/>
    <text x="148" y="956" class="small">Input + system summary</text>
    <text x="148" y="990" class="h3">System</text>
    <rect x="148" y="1012" width="124" height="46" rx="14" fill="#102a43" stroke="#356086"/>
    <rect x="286" y="1012" width="122" height="46" rx="14" fill="#102a43" stroke="#356086"/>
    <text x="164" y="1038" class="micro">Detected band</text>
    <text x="303" y="1038" class="micro">Pairing source</text>
    <text x="164" y="1056" class="label">800 MHz</text>
    <text x="303" y="1056" class="label">Standard</text>
  </g>

  <g>
    <rect x="460" y="920" width="612" height="170" rx="24" fill="#0c1b2c" stroke="#244463"/>
    <text x="488" y="956" class="small">Standard configuration matrix</text>
    <text x="488" y="990" class="h3">Plans</text>
    <rect x="490" y="1012" width="256" height="54" rx="16" fill="#10243a" stroke="#315778"/>
    <rect x="764" y="1012" width="278" height="54" rx="16" fill="#10243a" stroke="#315778"/>
    <text x="514" y="1042" class="label">Plan 17</text>
    <text x="787" y="1042" class="label">Likely licensable</text>
    <rect x="514" y="1052" width="216" height="10" rx="5" fill="#173350"/>
    <rect x="514" y="1052" width="142" height="10" rx="5" fill="#4aa6e9"/>
    <rect x="764" y="1052" width="248" height="10" rx="5" fill="#173350"/>
    <rect x="764" y="1052" width="180" height="10" rx="5" fill="#2f7fcb"/>
  </g>

  <g>
    <rect x="1096" y="920" width="384" height="170" rx="24" fill="#0c1b2c" stroke="#244463"/>
    <text x="1124" y="956" class="small">Ordering form summary</text>
    <text x="1124" y="990" class="h3">Quote Draft</text>
    <rect x="1124" y="1012" width="156" height="46" rx="14" fill="#102a43" stroke="#356086"/>
    <rect x="1292" y="1012" width="156" height="46" rx="14" fill="#102a43" stroke="#356086"/>
    <text x="1142" y="1038" class="micro">System TX</text>
    <text x="1310" y="1038" class="micro">System RX</text>
    <text x="1142" y="1056" class="label">851.0000</text>
    <text x="1310" y="1056" class="label">806.0000</text>
  </g>

  <rect x="120" y="1110" width="1360" height="16" rx="8" fill="#0d2740"/>
  <rect x="120" y="1110" width="544" height="16" rx="8" fill="#4aa6e9"/>
</svg>
